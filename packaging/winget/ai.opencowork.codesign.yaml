# winget package manifest — seed for first submission to microsoft/winget-pkgs.
# Subsequent releases are automated via vedantmgoyal9/winget-releaser in release.yml.
#
# Submission procedure (one-time):
#   1. Fork microsoft/winget-pkgs.
#   2. Run `wingetcreate new` locally against a v0.1.2 x64 installer URL; it
#      will scaffold the three-file manifest into the correct directory.
#   3. Open PR to microsoft/winget-pkgs. Wait for validation + merge.
#   4. Set WINGET_PAT repo secret (classic PAT, public_repo scope, on your
#      fork account — NOT the org account, see winget-releaser docs).
#   5. Re-enable the `winget` job in release.yml.
